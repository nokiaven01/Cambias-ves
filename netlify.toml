[build]
  command   = "npm run build"
  publish   = "dist"

# Redirige la descarga del APK hacia Telegram
[[redirects]]
  from   = "/cambioves.apk"
  to     = "https://t.me/cambiasves/2"
  status = 302
  force  = true

# Service Worker: nunca cacheado
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

# SPA: todas las demás rutas apuntan a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
