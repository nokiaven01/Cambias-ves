[build]
  command   = "npm run build && cp public/cambioves.apk dist/cambioves.apk"
  publish   = "dist"

# APK: Content-Type correcto para que Android lo reconozca como instalable
[[headers]]
  for = "/cambioves.apk"
  [headers.values]
    Content-Type        = "application/vnd.android.package-archive"
    Content-Disposition = 'attachment; filename="cambioves.apk"'
    Cache-Control       = "public, max-age=86400"

# Service Worker: nunca cacheado
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

# Excluir el APK del redirect SPA
[[redirects]]
  from   = "/cambioves.apk"
  to     = "/cambioves.apk"
  status = 200

# SPA: todas las demás rutas apuntan a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
